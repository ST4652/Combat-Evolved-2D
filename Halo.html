        function checkCheckpoints() {

            checkpoints.forEach(cp => {

                if (cp.activated) return;

                let dist = Math.hypot(
                    player.x - cp.x,
                    player.y - cp.y
                );

                if (dist < 120) {      //TOTO MENIT JAK TAK XXXXXXXXXXXXXXXXXX


                    cp.activated = true;

                    currentCheckpoint.x = cp.spawnX;
                    currentCheckpoint.y = cp.spawnY;

                    currentSection = cp.section;

                    checkpointMsg = "Checkpoint done...";
                    checkpointMsgTime = Date.now();
                }
            });

        function drawBackground(offset) {
            // Vonkajšie pozadie
            ctx.fillStyle = "#999999";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gridSize = 40;

            floors.forEach(f => {
                // Podlaha
                const BIG_TILE = 2400;
                const SCALE = 1.25;


                for (
                    let tx = f.x;
                    tx < f.x + f.w;
                    tx += BIG_TILE
                ) {

                    for (
                        let ty = f.y;
                        ty < f.y + f.h;
                        ty += BIG_TILE
                    ) {
                        if (
                            tx + BIG_TILE < offset.x ||
                            tx > offset.x + canvas.width ||
                            ty + BIG_TILE < offset.y ||
                            ty > offset.y + canvas.height
                        ) {
                            continue;
                        }

                        // koľko sa reálne má vykresliť
                        let drawW = Math.min(
                            BIG_TILE,
                            f.x + f.w - tx
                        );

                        let drawH = Math.min(
                            BIG_TILE,
                            f.y + f.h - ty
                        );

                        ctx.drawImage(

                            grassBig,

                            0,
                            0,

                            drawW / SCALE,
                            drawH / SCALE,

                            Math.round(tx - offset.x),
                            Math.round(ty - offset.y),

                            drawW,
                            drawH
                        )
                    }
                }

                // Mriežka - clip na floor, globálne zarovnaná
                /*  ctx.save();

                      ctx.beginPath();
                      ctx.moveTo(gx - offset.x, f.y - offset.y);

                      ctx.stroke();
                  }
                  for (let gy = startY; gy <= endY; gy += gridSize) {

        function drawWalls(offset) {

            const SCALE = 1.25;

            walls.forEach(w => {

                if (
                    w.x + w.w < offset.x ||
                    w.x > offset.x + canvas.width ||
                    w.y + w.h < offset.y ||
                    w.y > offset.y + canvas.height
                ) {
                    return;
                }

                let img = rockBigTile;

                // veľkosť source oblasti
                let srcW = w.w / SCALE;
                let srcH = w.h / SCALE;

                ctx.drawImage(

                    img,

                    0,
                    0,
                    srcW,
                    srcH,

                    Math.round(w.x - offset.x),
                    Math.round(w.y - offset.y),

                    w.w,
                    w.h
                );
            });
        }

        function drawEnemies(offset) {
            let enemySize = 72;
            enemies.forEach(e => {
                let img;

                if (e.type === "grunt") {

                    img =
                        e.rank === "major"
                            ? gruntMajorImg
                            : gruntMinorImg;
                }

                else if (e.type === "elite") {

                    if (e.rank === "minor") {

                        img = eliteMinorImg;
                    }

                    else if (e.rank === "major") {

                        img = eliteMajorImg;
                    }

                    else {

                        img = eliteZealotImg;
                    }
                }
                ctx.save();
                ctx.translate(e.x - offset.x, e.y - offset.y);
                ctx.rotate(e.angle);
                ctx.drawImage(img, -enemySize / 2, -enemySize / 2, enemySize, enemySize);
                ctx.restore();
            });
        }

        function drawBullets(offset) {
            bullets.forEach(b => {
                if (b.from === "player") {
                    ctx.save();
                    ctx.shadowColor = "orange";
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = "#ffcc00";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#ff8800";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else if (b.enemyType === "elite") {
                    ctx.save();
                    ctx.shadowColor = "#0000ff";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#0066ff";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaddff";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.shadowColor = "#00ff44";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#00cc33";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaffbb";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                }
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(player.angle);
            let currentImg =
                player.weapon === "dmr"
                    ? dmrPlayerImg
                    : arPlayerImg;

            ctx.drawImage(
                currentImg,
                -player.size / 2,
                -player.size / 2,
                player.size,
                player.size
            );
            ctx.restore();
        }

        function drawHP() {

            let x = canvas.width / 2 - hpBar.width / 2;

            // background
            ctx.fillStyle = hpBar.backgroundColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );

            // hp percent
            let hpPercent = player.hp / player.maxHp;

            // 🔥 clamp
            if (hpPercent < 0) hpPercent = 0;

            // actual hp
            ctx.fillStyle = hpBar.hpColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width * hpPercent,
                hpBar.height
            );

            // border
            ctx.strokeStyle = hpBar.borderColor;
            ctx.lineWidth = 2;

            ctx.strokeRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );
        }
