<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <title>PoA Level</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }

        canvas {

<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        ctx.imageSmoothingEnabled = false;

        ///////////////////
        // WALLS
        //////////////////



        let walls = [

            // cliff edge
            { x: 40, y: 0, w: 40, h: 40, texture: "rock" },
            { x: 80, y: 40, w: 40, h: 40, texture: "rock" },
            { x: 120, y: 80, w: 160, h: 120, texture: "rock" },

        ];




        let floors = [
            { x: 0, y: 0, w: 4000, h: 2000 },


        ];




        //////////////////////////
        // ENEMY
        //////////////////////////
        let enemies = [
            //chodba medzi 1 a 2
      //      { x: 150, y: 10, type: "grunt", hp: 2, cooldown: 0, section: 1 },
        //    { x: 170, y: 10, type: "elite", hp: 4, cooldown: 0, section: 1 },
        ];
        const originalEnemies = structuredClone(enemies);

        /////////
        //krv a dead body
        /////////
        let corpses = [];
        let bloods = [];






        //////////////////////////
        // CHECKPOINTY
        //////////////////////////

        let checkpoints = [

            // checkpoint po prvej časti
            {
                x: 1400,
                y: 850,

                spawnX: 1480,
                spawnY: 880,

                section: 2,

                requiredSection: 1,

                activated: false,

            },

            // checkpoint po druhej časti
            {
                x: 3230,
                y: -150,

                spawnX: 3230,
                spawnY: -150,

                section: 3,

                requiredSection: 2,

                activated: false
            },

            {
                x: 4580,
                y: 1470,

                spawnX: 4580,
                spawnY: 1470,

                section: 4,

                requiredSection: 3,

                activated: false
            }
        ];

        let currentCheckpoint = {
            x: 500,
            y: 500
        };

        let currentSection = 1;

        let dying = false;

        let deathFade = 0;



        /////


        let checkpointMsg = "";
        let checkpointMsgTime = 0;

        function checkCheckpoints() {

            checkpoints.forEach(cp => {

                if (cp.activated) return;

                let dist = Math.hypot(
                    player.x - cp.x,
                    player.y - cp.y
                );

                if (dist < 120) {      //TOTO MENIT JAK TAK XXXXXXXXXXXXXXXXXX


                    cp.activated = true;

                    currentCheckpoint.x = cp.spawnX;
                    currentCheckpoint.y = cp.spawnY;

                    currentSection = cp.section;

                    checkpointMsg = "Checkpoint done...";
                    checkpointMsgTime = Date.now();
                }
            });
        }

        //








        /////////////////
        // exit
        /////////////

        let exitZone = { x: 1460, y: 2710, w: 440, h: 200 }

        let fading = false;
        let fadeAlpha = 0;








        //////////////////////////
        // DRAW    aaaa
        //////////////////////////
        function drawBackground(offset) {
            // Vonkajšie pozadie
            ctx.fillStyle = "#999999";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gridSize = 40;

            floors.forEach(f => {
                // Podlaha
                for (
                    let tx = f.x;
                    tx < f.x + f.w;
                    tx += TILE_SIZE
                ) {

                    for (
                        let ty = f.y;
                        ty < f.y + f.h;
                        ty += TILE_SIZE
                    ) {

ctx.drawImage(
    grassTile,

    Math.round(tx - offset.x),
    Math.round(ty - offset.y),

    TILE_SIZE,
    TILE_SIZE
);
                    }
                };

                // Mriežka - clip na floor, globálne zarovnaná
              /*  ctx.save();
                ctx.beginPath();
                ctx.rect(f.x - offset.x, f.y - offset.y, f.w, f.h);
                ctx.clip();

                ctx.strokeStyle = "rgba(0,0,0,0.11)";
                ctx.lineWidth = 1;

                // Globálne zarovnanie - zaokrúhliť na gridSize
                const startX = Math.floor((f.x) / gridSize) * gridSize;
                const startY = Math.floor((f.y) / gridSize) * gridSize;
                const endX = f.x + f.w + gridSize;
                const endY = f.y + f.h + gridSize;

                for (let gx = startX; gx <= endX; gx += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(gx - offset.x, f.y - offset.y);
                    ctx.lineTo(gx - offset.x, f.y + f.h - offset.y);
                    ctx.stroke();
                }
                for (let gy = startY; gy <= endY; gy += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(f.x - offset.x, gy - offset.y);
                    ctx.lineTo(f.x + f.w - offset.x, gy - offset.y);
                    ctx.stroke();
                }

                ctx.restore();   */
            });
        }

        function drawWalls(offset) {

            walls.forEach(w => {

                let img = rockTile;

                if (w.texture === "rock") {
                    img = rockTile;
                }

                // opakovanie textúry
                for (let tx = 0; tx < w.w; tx += TILE_SIZE) {

                    for (let ty = 0; ty < w.h; ty += TILE_SIZE) {

                        ctx.drawImage(
                            img,

                            w.x + tx - offset.x,
                            w.y + ty - offset.y,

                            TILE_SIZE,
                            TILE_SIZE
                        );
                    }
                }
            });
        }

        function drawEnemies(offset) {
            let enemySize = 72;
            enemies.forEach(e => {
                let img = (e.type === "grunt") ? gruntImg : eliteImg;
                ctx.save();
                ctx.translate(e.x - offset.x, e.y - offset.y);
                ctx.rotate(e.angle);
                ctx.drawImage(img, -enemySize / 2, -enemySize / 2, enemySize, enemySize);
                ctx.restore();
            });
        }

        function drawBullets(offset) {
            bullets.forEach(b => {
                if (b.from === "player") {
                    ctx.save();
                    ctx.shadowColor = "orange";
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = "#ffcc00";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#ff8800";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else if (b.enemyType === "elite") {
                    ctx.save();
                    ctx.shadowColor = "#0000ff";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#0066ff";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaddff";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.shadowColor = "#00ff44";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#00cc33";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaffbb";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                }
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(player.angle);
            let currentImg =
                player.weapon === "dmr"
                    ? dmrPlayerImg
                    : arPlayerImg;

            ctx.drawImage(
                currentImg,
                -player.size / 2,
                -player.size / 2,
                player.size,
                player.size
            );
            ctx.restore();
        }

        function drawHP() {

            let x = canvas.width / 2 - hpBar.width / 2;

            // background
            ctx.fillStyle = hpBar.backgroundColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );

            // hp percent
            let hpPercent = player.hp / player.maxHp;

            // 🔥 clamp
            if (hpPercent < 0) hpPercent = 0;

            // actual hp
            ctx.fillStyle = hpBar.hpColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width * hpPercent,
                hpBar.height
            );

            // border
            ctx.strokeStyle = hpBar.borderColor;
            ctx.lineWidth = 2;

            ctx.strokeRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );
        }


    </script>

</body>

</html>
