        function checkCheckpoints() {

            checkpoints.forEach(cp => {

                if (cp.activated) return;

                let dist = Math.hypot(
                    player.x - cp.x,
                    player.y - cp.y

        function drawBackground(offset) {

            ctx.fillStyle = "#222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            floors.forEach(f => {

                let img = null;
                let usePattern = false;

                // texture selection
                if (f.texture === "grassBig") {

                    img = grassBig;
                    usePattern = true;
                }

                else if (f.texture === "rockBig") {

                    img = rockBigTile;
                    usePattern = true;
                }

                else if (f.texture === "grass") {

                    img = grassTile;
                }

                else if (f.texture === "metal") {

                    img = mostTile;
                }

                else if (f.texture === "rock") {

                    img = rockTile;
                }

                // VEĽKÉ TEXTÚRY
                if (img && usePattern) {

                    ctx.save();

                    ctx.scale(TEXTURE_SCALE, TEXTURE_SCALE);

                    let pattern =
                        ctx.createPattern(img, "repeat");

                    ctx.translate(
                        -offset.x / TEXTURE_SCALE,
                        -offset.y / TEXTURE_SCALE
                    );

                    ctx.fillStyle = pattern;

                    ctx.fillRect(

                        f.x / TEXTURE_SCALE,
                        f.y / TEXTURE_SCALE,

                        f.w / TEXTURE_SCALE,
                        f.h / TEXTURE_SCALE
                    );

                    ctx.restore();
                }

                // MALÉ TILE TEXTÚRY
                else if (img) {

                    const tileSize = 40;

                    for (let x = 0; x < f.w; x += tileSize) {

                        for (let y = 0; y < f.h; y += tileSize) {

                            ctx.drawImage(

                                img,

                                f.x + x - offset.x,
                                f.y + y - offset.y,

                                tileSize,
                                tileSize
                            );
                        }
                    }
                }

                // fallback
                else {

                    ctx.fillStyle = "#888";

                    ctx.fillRect(
                        f.x - offset.x,
                        f.y - offset.y,
                        f.w,
                        f.h
                    );
                }
            });
        }

        function drawWalls(offset) {

            walls.forEach(w => {

                let img = null;

                // výber textúry
                if (w.texture === "rock") {

                    img = rockTile;
                }

                else if (w.texture === "metal") {

                    img = mostTile;
                }

                // ak má textúru
                if (img) {

                    const tileSize = 40;

                    for (
                        let x = 0;
                        x < Math.abs(w.w);
                        x += tileSize
                    ) {

                        for (
                            let y = 0;
                            y < Math.abs(w.h);
                            y += tileSize
                        ) {

                            ctx.drawImage(

                                img,

                                w.x + x - offset.x,
                                w.y + y - offset.y,

                                tileSize,
                                tileSize
                            );
                        }
                    }
                }

                // fallback bez textúry
                else {

                    ctx.fillStyle = "#555";

                    ctx.fillRect(
                        w.x - offset.x,
                        w.y - offset.y,
                        w.w,
                        w.h
                    );
                }
            });
        }

        function updateFade() {

    if (fading) {

        fadeAlpha += 0.01;

        if (fadeAlpha >= 1) {
            window.location.href = "TaR1.html";

}

        function drawEnemies(offset) {
            let enemySize = 72;
            enemies.forEach(e => {
                let img;

                if (e.type === "grunt") {

                    img =
                        e.rank === "major"
                            ? gruntMajorImg
                            : gruntMinorImg;
                }

                else if (e.type === "elite") {

                    if (e.rank === "minor") {

                        img = eliteMinorImg;
                    }

                    else if (e.rank === "major") {

                        img = eliteMajorImg;
                    }

                    else {

                        img = eliteZealotImg;
                    }
                }
                ctx.save();
                ctx.translate(e.x - offset.x, e.y - offset.y);
                ctx.rotate(e.angle);
                ctx.drawImage(img, -enemySize / 2, -enemySize / 2, enemySize, enemySize);
                ctx.restore();
            });
        }

        function drawBullets(offset) {
            bullets.forEach(b => {
                if (b.from === "player") {
                    ctx.save();
                    ctx.shadowColor = "orange";
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = "#ffcc00";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#ff8800";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else if (b.enemyType === "elite") {
                    ctx.save();
                    ctx.shadowColor = "#0000ff";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#0066ff";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaddff";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.shadowColor = "#00ff44";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#00cc33";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaffbb";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                }
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(player.angle);
            let currentImg =
                player.weapon === "dmr"
                    ? dmrPlayerImg
                    : arPlayerImg;

            ctx.drawImage(
                currentImg,
                -player.size / 2,
                -player.size / 2,
                player.size,
                player.size
            );
            ctx.restore();
        }

        function drawHP() {

            let x = canvas.width / 2 - hpBar.width / 2;

            // background
            ctx.fillStyle = hpBar.backgroundColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );

            // hp percent
            let hpPercent = player.hp / player.maxHp;

            // 🔥 clamp
            if (hpPercent < 0) hpPercent = 0;

            // actual hp
            ctx.fillStyle = hpBar.hpColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width * hpPercent,
                hpBar.height
            );

            // border
            ctx.strokeStyle = hpBar.borderColor;
            ctx.lineWidth = 2;

            ctx.strokeRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );
        }
