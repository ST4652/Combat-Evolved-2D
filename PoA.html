        function shoot() {

            if (dying) return;

            let weapon = weapons[player.weapon];

            if (player.reloading) return;

            if (player.ammo[player.weapon] <= 0) {

                reloadWeapon();
                return;
            }

            let now = Date.now();

            if (now - player.lastShot < weapon.fireRate) return;

            player.lastShot = now;

            player.ammo[player.weapon]--;

            let angle = Math.atan2(
                mouse.y - canvas.height / 2,
                mouse.x - canvas.width / 2
            );

            angle += (Math.random() - 0.5) * weapon.spread;

            bullets.push({

                x: player.x,
                y: player.y,

                dx: Math.cos(angle) * weapon.bulletSpeed,
                dy: Math.sin(angle) * weapon.bulletSpeed,

                size: 10,

                from: "player",

                damage: weapon.damage,

                life: 80
            });
        }









        function reloadWeapon() {

            if (player.reloading) return;

            player.reloading = true;

            setTimeout(() => {

                player.ammo[player.weapon] =
                    weapons[player.weapon].magSize;

                player.reloading = false;

            }, weapons[player.weapon].reloadTime);
        }

        //////////////////////////
        // KOLÍZIA
        //////////////////////////
        function collideRect(x, y, size, w) {
            return (
                x - size / 10 < w.x + w.w &&
                x + size / 10 > w.x &&
                y - size / 10 < w.y + w.h &&
                y + size / 10 > w.y
            );
        }

        function collideWithWalls(x, y, size) {
            for (let w of walls) {
                if (collideRect(x, y, size, w)) return true;
            }
            return false;
        }

        //////////////////////////
        // UPDATE
        //////////////////////////
        function updatePlayer() {
            if (dying) return;
            let newX = player.x;
            let newY = player.y;
            if (keys["w"]) newY -= player.speed;
            if (keys["s"]) newY += player.speed;
            if (keys["a"]) newX -= player.speed;
            if (keys["d"]) newX += player.speed;
            if (!collideWithWalls(newX, player.y, player.size)) player.x = newX;
            if (!collideWithWalls(player.x, newY, player.size)) player.y = newY;
            player.angle = Math.atan2(mouse.y - canvas.height / 2, mouse.x - canvas.width / 2);
        }

        function updateBullets() {
            bullets.forEach((b, i) => {
                b.x += b.dx;
                b.y += b.dy;
                b.life--;

                if (b.life <= 0) {
                    bullets.splice(i, 1);
                    return;
                }
                for (let w of walls) {
                    if (collideRect(b.x, b.y, b.size, w)) {
                        bullets.splice(i, 1);
                        return;
                    }
                }
                if (b.from === "enemy") {
                    if (
                        b.x < player.x + player.size &&
                        b.x + b.size > player.x &&
                        b.y < player.y + player.size &&
                        b.y + b.size > player.y
                    ) {
                        player.hp -= 5;

                        player.lastHitTime = Date.now();
                        bullets.splice(i, 1);
                    }
                }
            });
        }

        function updateEnemies() {

            enemies.forEach(e => {

                let dx = player.x - e.x;
                let dy = player.y - e.y;

                let dist = Math.sqrt(dx * dx + dy * dy);

                let speed = (e.type === "grunt") ? 1.1 : 1.3;

                let activateDist = 620;

                let stopDist = (e.type === "grunt") ? 170 : 210;

                // enemy AI variables
                if (!e.strafeDir) e.strafeDir = 1;
                if (!e.changeDirTime) e.changeDirTime = 0;
                if (!e.lastPlayerX) e.lastPlayerX = player.x;
                if (!e.lastPlayerY) e.lastPlayerY = player.y;

                // zapamätanie poslednej pozície hráča
                if (dist < activateDist) {
                    e.lastPlayerX = player.x;
                    e.lastPlayerY = player.y;
                }

                // ide ku poslednej známej pozícii
                let targetX = e.lastPlayerX;
                let targetY = e.lastPlayerY;

                dx = targetX - e.x;
                dy = targetY - e.y;

                dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < activateDist + 200) {

                    e.angle = Math.atan2(dy, dx);

                    let moveX = 0;
                    let moveY = 0;

                    // PRIBLIŽOVANIE
                    if (dist > stopDist) {

                        moveX = dx / dist * speed;
                        moveY = dy / dist * speed;
                    }

                    // STRAFING
                    else {

                        e.changeDirTime--;

                        if (e.changeDirTime <= 0) {

                            e.strafeDir *= -1;

                            e.changeDirTime = 40 + Math.random() * 80;
                        }

                        let strafeSpeed = 0.4;

                        moveX = (-dy / dist) * strafeSpeed * e.strafeDir;
                        moveY = (dx / dist) * strafeSpeed * e.strafeDir;

                        // občas cúvne
                        if (Math.random() < 0.01) {

                        }
                    }

                    // pokus o pohyb
                    let newX = e.x + moveX;
                    let newY = e.y + moveY;

                    // normálny pohyb
                    if (!collideWithWalls(newX, e.y, 30)) {

                        e.x = newX;
                    }

                    // ak narazí do steny → skúsi iný smer
                    else {

                        if (!collideWithWalls(e.x, e.y + moveY, 30)) {

                            e.y += moveY;
                        }
                    }

                    if (!collideWithWalls(e.x, newY, 30)) {

                        e.y = newY;
                    }

                    else {

                        if (!collideWithWalls(e.x + moveX, e.y, 30)) {

                            e.x += moveX;
                        }
                    }

                    // streľba
                    e.cooldown--;

                    if (e.cooldown <= 0 && dist < 500) {

                        let angle = Math.atan2(
                            player.y - e.y,
                            player.x - e.x
                        );

                        // nepresnosť
                        angle += (Math.random() - 0.5) * 0.18;

                        bullets.push({

                            x: e.x,
                            y: e.y,

                            dx: Math.cos(angle) * 5,
                            dy: Math.sin(angle) * 5,

                            size: 5,

                            from: "enemy",

                            enemyType: e.type,

                            life: 140
                        });



                        // elite strieľa rýchlejšie
                        e.cooldown = (e.type === "grunt")
                            ? 95 + Math.random() * 30
                            : 45 + Math.random() * 20;
                    }


                }
            });
        }
        function checkCollisions() {
            bullets.forEach((b, i) => {
                enemies.forEach((e, j) => {
                    if (
                        b.from === "player" &&
                        b.x < e.x + 30 &&
                        b.x + 5 > e.x &&
                        b.y < e.y + 30 &&
                        b.y + 5 > e.y
                    ) {
                        e.hp -= b.damage;
                        bullets.splice(i, 1);
                        if (e.hp <= 0) enemies.splice(j, 1);
                    }
                });
            });
        }

        //////////////////////////
        // KAMERA
        //////////////////////////
        function getOffset() {
            return {
                x: player.x - canvas.width / 2,
                y: player.y - canvas.height / 2
            };
        }

        //////////////////////////
        // DRAW
        //////////////////////////
        function drawBackground(offset) {
            // Vonkajšie pozadie
            ctx.fillStyle = "#222222";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const gridSize = 40;

            floors.forEach(f => {
                // Podlaha
                ctx.fillStyle = "#888888";
                ctx.fillRect(f.x - offset.x, f.y - offset.y, f.w, f.h);

                // Mriežka - clip na floor, globálne zarovnaná
                ctx.save();
                ctx.beginPath();
                ctx.rect(f.x - offset.x, f.y - offset.y, f.w, f.h);
                ctx.clip();

                ctx.strokeStyle = "rgba(0,0,0,0.11)";
                ctx.lineWidth = 1;

                // Globálne zarovnanie - zaokrúhliť na gridSize
                const startX = Math.floor((f.x) / gridSize) * gridSize;
                const startY = Math.floor((f.y) / gridSize) * gridSize;
                const endX = f.x + f.w + gridSize;
                const endY = f.y + f.h + gridSize;

                for (let gx = startX; gx <= endX; gx += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(gx - offset.x, f.y - offset.y);
                    ctx.lineTo(gx - offset.x, f.y + f.h - offset.y);
                    ctx.stroke();
                }
                for (let gy = startY; gy <= endY; gy += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(f.x - offset.x, gy - offset.y);
                    ctx.lineTo(f.x + f.w - offset.x, gy - offset.y);
                    ctx.stroke();
                }

                ctx.restore();
            });
        }

        function drawWalls(offset) {
            ctx.fillStyle = "#555";
            walls.forEach(w => {
                ctx.fillRect(w.x - offset.x, w.y - offset.y, w.w, w.h);
            });
        }

        function drawEnemies(offset) {
            let enemySize = 72;
            enemies.forEach(e => {
                let img = (e.type === "grunt") ? gruntImg : eliteImg;
                ctx.save();
                ctx.translate(e.x - offset.x, e.y - offset.y);
                ctx.rotate(e.angle);
                ctx.drawImage(img, -enemySize / 2, -enemySize / 2, enemySize, enemySize);
                ctx.restore();
            });
        }

        function drawBullets(offset) {
            bullets.forEach(b => {
                if (b.from === "player") {
                    ctx.save();
                    ctx.shadowColor = "orange";
                    ctx.shadowBlur = 5;
                    ctx.fillStyle = "#ffcc00";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#ff8800";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else if (b.enemyType === "elite") {
                    ctx.save();
                    ctx.shadowColor = "#0000ff";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#0066ff";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaddff";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.shadowColor = "#00ff44";
                    ctx.shadowBlur = 100;
                    ctx.fillStyle = "#00cc33";
                    ctx.fillRect(b.x - offset.x - 3, b.y - offset.y - 3, 8, 8);
                    ctx.fillStyle = "#aaffbb";
                    ctx.fillRect(b.x - offset.x - 1, b.y - offset.y - 1, 4, 4);
                    ctx.restore();
                }
            });
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(player.angle);
            let currentImg =
                player.weapon === "dmr"
                    ? dmrPlayerImg
                    : arPlayerImg;

            ctx.drawImage(
                currentImg,
                -player.size / 2,
                -player.size / 2,
                player.size,
                player.size
            );
            ctx.restore();
        }

        function drawHP() {

            let x = canvas.width / 2 - hpBar.width / 2;

            // background
            ctx.fillStyle = hpBar.backgroundColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );

            // hp percent
            let hpPercent = player.hp / player.maxHp;

            // 🔥 clamp
            if (hpPercent < 0) hpPercent = 0;

            // actual hp
            ctx.fillStyle = hpBar.hpColor;
            ctx.fillRect(
                x,
                hpBar.y,
                hpBar.width * hpPercent,
                hpBar.height
            );

            // border
            ctx.strokeStyle = hpBar.borderColor;
            ctx.lineWidth = 2;

            ctx.strokeRect(
                x,
                hpBar.y,
                hpBar.width,
                hpBar.height
            );
        }

        //////////////////////////
        // LOOP
        //////////////////////////
        function gameLoop() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePlayer();
            if (
                mouseDown &&
                weapons[player.weapon].automatic
            ) {
                shoot();
            }
            updateBullets();
            updateEnemies();
            checkCollisions();

            regenerateHp();

            checkLevelEnd();

            let offset = getOffset();

            drawBackground(offset);
            drawWalls(offset);
            drawEnemies(offset);
            drawBullets(offset);
            drawPlayer();
            drawHP();
            drawAmmo();

            updateFade();
            drawFade();
            drawDeathFade();

            checkCheckpoints();

            checkDeath();
            updateDeathFade();

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
