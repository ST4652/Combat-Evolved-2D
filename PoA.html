<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>PoA Level</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}
canvas {
    display: block;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

//////////////////////////
// HRÁČ
//////////////////////////
let player = {
    x: 500,
    y: 500,
    size: 0,
    speed: 4,
    angle: 0,
    hp: 100
};

//////////////////////////
// STENY (MAPA)
//////////////////////////
let walls = [
    {x: 300, y: 200, w: 600, h: 20},
    {x: 200, y: 780, w: 600, h: 20},
    {x: 200, y: 200, w: 20, h: 600},
    {x: 780, y: 200, w: 20, h: 600},

    {x: 400, y: 400, w: 200, h: 20},
    {x: 400, y: 600, w: 200, h: 20}
];

//////////////////////////
// OVLÁDANIE
//////////////////////////
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let mouse = { x: 0, y: 0 };
canvas.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

//////////////////////////
// STRELY
//////////////////////////
let bullets = [];

canvas.addEventListener("click", () => {
    let angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);

    bullets.push({
        x: player.x,
        y: player.y,
        dx: Math.cos(angle) * 8,
        dy: Math.sin(angle) * 8,
        size: 5,
        from: "player"
    });
});

//////////////////////////
// ENEMY
//////////////////////////
let enemies = [
    {x: 300, y: 250, type: "grunt", hp: 2, cooldown: 0},
    {x: 650, y: 300, type: "grunt", hp: 2, cooldown: 0},
    {x: 400, y: 350, type: "grunt", hp: 2, cooldown: 0},
    {x: 700, y: 700, type: "elite", hp: 4, cooldown: 0},
    {x: 250, y: 700, type: "elite", hp: 4, cooldown: 0},
];

//////////////////////////
// KOLÍZIA
//////////////////////////
function collideRect(x, y, size, w) {
    return (
        x < w.x + w.w &&
        x + size > w.x &&
        y < w.y + w.h &&
        y + size > w.y
    );
}

function collideWithWalls(x, y, size) {
    for (let w of walls) {
        if (collideRect(x, y, size, w)) return true;
    }
    return false;
}

//////////////////////////
// UPDATE
//////////////////////////
function updatePlayer() {
    let newX = player.x;
    let newY = player.y;

    if (keys["w"]) newY -= player.speed;
    if (keys["s"]) newY += player.speed;
    if (keys["a"]) newX -= player.speed;
    if (keys["d"]) newX += player.speed;

    if (!collideWithWalls(newX, player.y, player.size)) player.x = newX;
    if (!collideWithWalls(player.x, newY, player.size)) player.y = newY;

    player.angle = Math.atan2(mouse.y - canvas.height/2, mouse.x - canvas.width/2);
}

function updateBullets() {
    bullets.forEach((b, i) => {

        b.x += b.dx;
        b.y += b.dy;

        // 🧱 kolízia so stenou
        for (let w of walls) {
            if (collideRect(b.x, b.y, b.size, w)) {
                bullets.splice(i, 1);
                return;
            }
        }

        // 💥 zásah hráča
        if (b.from === "enemy") {
            if (
                b.x < player.x + player.size &&
                b.x + b.size > player.x &&
                b.y < player.y + player.size &&
                b.y + b.size > player.y
            ) {
                player.hp -= 5;
                bullets.splice(i, 1);
            }
        }
    });
}

function updateEnemies() {
    enemies.forEach(e => {

        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        let speed = (e.type === "grunt") ? 1.5 : 2.5;

        let activateDist = 400;
        let stopDist = (e.type === "grunt") ? 180 : 140;

        if (dist < activateDist) {

            let moveX = 0;
            let moveY = 0;

            if (dist > stopDist) {
                moveX = dx/dist * speed;
                moveY = dy/dist * speed;
            } else {
                let strafe = (Math.random() - 0.8) * 0.80;
                moveX = -dy/dist * strafe;
                moveY = dx/dist * strafe;
            }

            let newX = e.x + moveX;
            let newY = e.y + moveY;

            if (!collideWithWalls(newX, e.y, 30)) e.x = newX;
            if (!collideWithWalls(e.x, newY, 30)) e.y = newY;

            e.cooldown--;

            if (e.cooldown <= 0) {
                let angle = Math.atan2(player.y - e.y, player.x - e.x);

                bullets.push({
                    x: e.x,
                    y: e.y,
                    dx: Math.cos(angle) * 5,
                    dy: Math.sin(angle) * 5,
                    size: 5,
                    from: "enemy"
                });

                e.cooldown = (e.type === "grunt") ? 120 : 60;
            }
        }
    });
}

function checkCollisions() {
    bullets.forEach((b, i) => {
        enemies.forEach((e, j) => {
            if (
                b.from === "player" &&
                b.x < e.x + 30 &&
                b.x + 5 > e.x &&
                b.y < e.y + 30 &&
                b.y + 5 > e.y
            ) {
                e.hp--;
                bullets.splice(i, 1);

                if (e.hp <= 0) enemies.splice(j, 1);
            }
        });
    });
}

//////////////////////////
// KAMERA
//////////////////////////
function getOffset() {
    return {
        x: player.x - canvas.width/2,
        y: player.y - canvas.height/2
    };
}

//////////////////////////
// DRAW
//////////////////////////
function drawWalls(offset) {
    ctx.fillStyle = "#555";
    walls.forEach(w => {
        ctx.fillRect(w.x - offset.x, w.y - offset.y, w.w, w.h);
    });
}

function drawEnemies(offset) {
    enemies.forEach(e => {
        ctx.fillStyle = (e.type === "grunt") ? "red" : "blue";
        ctx.fillRect(e.x - offset.x, e.y - offset.y, 30, 30);
    });
}

function drawBullets(offset) {
    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.fillRect(b.x - offset.x, b.y - offset.y, 5, 5);
    });
}

function drawPlayer() {
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(player.angle);

    ctx.fillStyle = "green";
    ctx.fillRect(-15, -15, 30, 30);

    ctx.restore();
}

//////////////////////////
// HP BAR
//////////////////////////
function drawHP() {
    ctx.fillStyle = "red";
    ctx.fillRect(canvas.width/2 - 150, 20, 300, 20);

    ctx.fillStyle = "lime";
    ctx.fillRect(canvas.width/2 - 150, 20, player.hp * 3, 20);
}

//////////////////////////
// LOOP
//////////////////////////
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updatePlayer();
    updateBullets();
    updateEnemies();
    checkCollisions();

    let offset = getOffset();

    drawWalls(offset);
    drawEnemies(offset);
    drawBullets(offset);
    drawPlayer();
    drawHP();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
